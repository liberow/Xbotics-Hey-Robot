# Main mock development deployment for autonomous runtime and channel integration.
deployment:
  id: mock-dev
  mode: local
  bus:
    type: nats
    url: nats://127.0.0.1:4222
    options:
      robot_publish_hz: 10.0
      robot_action_log_every_steps: 1
      robot_status_log_every_frames: 5

logging:
  level: INFO
  theme: dark
  json_format: false
  file_path: logs/mock-dev/app.log
  json_file_path: logs/mock-dev/app.jsonl
  throttle_sec: 0.0

resources:
  runtime_dir: runtime/mock.dev
  media:
    root: runtime/mock.dev/media
    max_items: 128
    image_save_every_n: 1
  episodes:
    root: runtime/mock.dev/episodes
  events:
    retain: 2000

skills:
  modules:
    - hey_robot.skills.builtin
  mode: bringup
  enabled:
    - inspect_scene
    - look_around
    - detect_marker
    - human_follow
    - stop_motion

notifications:
  defaults:
    channels: [web]
  channels:
    web: {}
    voice:
      chat_id: mock-voice
      sender_id: voice-user
    feishu:
      chat_id: ""
  kinds:
    task_watchdog:
      severity: critical
      channels: [web]
    proactive_message:
      severity: info
      channels: [web]

identity:
  enabled: true
  unified_user_episodes: true
  bindings:
    "cli:sender:local-user": owner
    "web:sender:eval-user": owner

channels:
  cli:
    type: cli
    enabled: true
    account_id: mock-dev
    prompt: "mock-dev> "
    sender_id: local-user
    chat_id: mock-dev-local
  web:
    type: web
    enabled: true
    account_id: mock-web
    host: 127.0.0.1
    port: 18080
    sender_id: eval-user
    chat_id: mock-dev
    access_log: false
    uvicorn_log_level: warning
  voice:
    type: voice
    enabled: false
    account_id: mock-voice
    sender_id: voice-user
    chat_id: mock-voice
    asr:
      model: ep-asr
    tts:
      enabled: false
  feishu:
    type: feishu
    enabled: false
    account_id: xlerobot-feishu
    app_id_env: FEISHU_APP_ID
    app_secret_env: FEISHU_APP_SECRET
    encrypt_key_env: FEISHU_ENCRYPT_KEY
    verification_token_env: FEISHU_VERIFICATION_TOKEN
    group_policy: mention
    reply_to_message: true
    domain: feishu
    allow_from:
      - "*"
    media_root: runtime/mock.dev/media/feishu

robots:
  mock0:
    type: mock
    family: xlerobot
    environment: mock
    driver: mock
    embodiment_profile: xlerobot_mock
    enabled: true
    body: xlerobot
    control_hz: 10.0
    world:
      locations:
        front_workspace: {}
        table: {}
        bin: {}
        shelf: {}
      objects:
        cup:
          visible: false
          location: front_workspace
          graspable: true
        block:
          visible: false
          location: front_workspace
          graspable: true
        marker:
          visible: true
          location: table
          graspable: true
    visible_after_scans:
      cup: 1
      block: 1

capability_services: {}

policies:
  embodied_skills:
    type: skill
    enabled: true
    robot_id: mock0
    device: skill-runtime
    freq_hz: 10.0
    settings:
      codec: skill
      body: xlerobot
      default_step_cm: 20.0
      default_turn_deg: 30.0
      max_step_cm: 80.0
      max_turn_deg: 120.0

agents:
  main:
    type: robot_agent
    enabled: true
    robot_id: mock0
    policy_id: embodied_skills
    settings:
      mode: autonomous
      auto_task_plan: true
      max_plan_robot_skills: 10
      max_iterations: 4
      long_horizon_iteration_margin: 8
      providers:
        planner:
          type: deepseek
          model_env: DEEPSEEK_MODEL
          api_key_env: DEEPSEEK_API_KEY
          base_url_env: DEEPSEEK_BASE_URL
          temperature: 0.0
          max_tokens: 1024
        feedback:
          type: deterministic
      execution_feedback:
        backend: status
        media_root: runtime/mock.dev/media
