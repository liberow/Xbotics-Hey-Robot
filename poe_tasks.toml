executor.type = "uv"

[tasks]

# Style control
_check = { shell = "python -m ruff check src tests" }
_fix = { shell = "python -m ruff check src tests --fix --exit-zero" }
_format = { shell = "python -m ruff format src tests" }
_lint = { shell = "python -m mypy src tests" }
style = { sequence = [
  "_format",
  "_fix",
  "_format",
], help = "Auto-fix and format the code using ruff." }
_validate-config = { shell = "python scripts/dev/validate_config.py", help = "Validate config file references are not stale." }
lint = { sequence = [
  "_validate-config",
  "_check",
  "_lint",
], help = "Check for style and type violations using ruff and mypy." }


# Temp file control
_clean-pyc = { shell = "python scripts/dev/clean.py pyc", help = "Remove Python file artifacts" }
_clean-build = { shell = "python scripts/dev/clean.py build", help = "Remove build artifacts" }
_clean-test = { shell = "python scripts/dev/clean.py test", help = "Remove test and coverage artifacts" }
_clean-lint = { shell = "python scripts/dev/clean.py lint", help = "Remove lint artifacts" }
clean = { sequence = [
  "_clean-build",
  "_clean-pyc",
  "_clean-test",
  "_clean-lint",
], help = "Remove all files generated by builds and tests." }

# Test
_test-pre-commit = { shell = "pre-commit install && pre-commit install-hooks && pre-commit run -a -v", help = "Install pre-commit" }
test = { shell = "python -m pytest tests", help = "Run tests quickly using the default Python environment." }
test-all = { sequence = [
  "lint",
  "style",
  "_test-pre-commit",
  "test",
], help = "Run all tests." }
test-ci = { sequence = ["_check", "_lint", "test"], help = "Run ci tests." }

# Release
build = { shell = "uv build", help = "Build source and wheel package" }
tag = { shell = "semantic-release -c releaserc.toml -vv  version", help = "Create a new version tag" }
publish = { shell = "python scripts/dev/publish.py", help = "Publish the package to PyPI" }
release = { sequence = [
  "tag",
  "publish",
], help = "Build source and wheel package" }
